<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DINGSTUDIO — 作品編輯器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Schibsted+Grotesk:wght@0,400;0,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f3ee; --panel:#fff; --line:#ddd8cd; --ink:#16140f; --dim:#6c665d;
      --danger:#b23b2e; --mono:"IBM Plex Mono",monospace;
      --body:"Schibsted Grotesk",system-ui,sans-serif; --disp:"Bricolage Grotesque",serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.5;padding:0 0 140px}
    .bar{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 90%,transparent);
      backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px clamp(16px,4vw,40px)}
    .bar h1{font-family:var(--disp);font-weight:800;font-size:1.1rem;letter-spacing:-.02em;margin-right:auto}
    .wrap{max-width:920px;margin:0 auto;padding:0 clamp(16px,4vw,40px)}
    .steps{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin:22px 0;font-size:.92rem}
    .steps b{font-weight:600}
    .steps ol{margin:8px 0 0 18px} .steps li{margin:4px 0}
    button{font-family:var(--body);font-weight:500;font-size:.9rem;
      border:1px solid var(--ink);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;cursor:pointer;transition:opacity .2s}
    button:hover{opacity:.84}
    button.ghost{background:transparent;color:var(--ink)}
    button.tiny{padding:6px 11px;font-size:.82rem}
    button.danger{border-color:var(--danger);color:var(--danger);background:transparent}
    button.big{font-size:1.05rem;padding:16px 26px}
    .save{background:#1f7a4d;border-color:#1f7a4d}
    .empty{text-align:center;padding:70px 20px;color:var(--dim)}
    .empty p{margin-bottom:18px;font-size:1rem}
    .film{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin:18px 0}
    .film-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .film-top .no{font-family:var(--disp);font-weight:800;font-size:1.15rem}
    .film-top .arrows{display:flex;gap:6px}
    .grid{display:grid;grid-template-columns:230px 1fr;gap:22px}
    .cover .frame{aspect-ratio:16/9;background:#0001;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .cover .small{font-size:.78rem;color:var(--dim);margin-top:8px;line-height:1.4}
    .fields{display:flex;flex-direction:column;gap:14px;min-width:0}
    label{display:block;font-size:.82rem;font-weight:500;margin-bottom:5px}
    label .en{color:var(--dim);font-weight:400;font-size:.92em}
    .help{font-size:.76rem;color:var(--dim);margin-top:4px}
    input,select{width:100%;font-family:var(--body);font-size:1rem;color:var(--ink);background:#fff;
      border:1px solid var(--line);border-radius:8px;padding:11px 12px}
    input:focus,select:focus{outline:none;border-color:var(--ink)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .credits{border-top:1px solid var(--line);padding-top:14px}
    .credit{display:grid;grid-template-columns:1fr 1.5fr auto;gap:8px;margin-bottom:8px}
    .credit input::placeholder{color:#bbb}
    .film-actions{display:flex;justify-content:flex-end;border-top:1px solid var(--line);padding-top:14px;margin-top:4px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
      padding:13px 22px;border-radius:10px;font-size:.92rem;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
    .toast.show{opacity:1}
    .addbar{display:flex;justify-content:center;margin:24px 0}
    @media(max-width:680px){.grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="bar">
    <h1>作品編輯器</h1>
    <input type="file" id="fileIn" accept="application/json" style="display:none">
    <button class="ghost tiny" id="loadBtn">載入 films.json</button>
    <button class="save" id="saveBtn">⬇ 儲存（下載 films.json）</button>
  </div>

  <div class="wrap">
    <div class="steps">
      <b>點用：</b>
      <ol>
        <li>喺下面改你想改嘅嘢（標題、封面相、credit…）</li>
        <li>改完撳右上角綠色 <b>「儲存（下載 films.json）」</b></li>
        <li>佢會 download 一個 <b>films.json</b>，將佢放返入你個網站資料夾，蓋過舊嗰個</li>
        <li>再拖個資料夾上 Netlify 更新（或者交返我幫你上線）</li>
      </ol>
    </div>
    <div id="list"></div>
    <div class="addbar"><button class="ghost" id="addBtn">＋ 加多一個作品</button></div>
  </div>

  <datalist id="roleList">
    <option value="Director"></option>
    <option value="Editor"></option>
    <option value="AD"></option>
    <option value="DP"></option>
    <option value="Producer"></option>
    <option value="Colourist"></option>
    <option value="Director / Editor"></option>
  </datalist>

  <div class="toast" id="toast"></div>
  <script src="admin.js"></script>
</body>
</html>
